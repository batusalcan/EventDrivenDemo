version: "3.8"

services:

  # ── Infrastructure ─────────────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  # ── Microservices ──────────────────────────────────────────────────────────

  order-api:
    build:
      context: .
      dockerfile: EventDrivenDemo.Api/Dockerfile
    ports:
      - "5263:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ActiveBroker: Kafka
      Kafka__BootstrapServers: kafka:9092
      Kafka__TopicName: order-events
      Kafka__ConsumerGroupId: order-consumer-group
      Aws__Region: eu-central-1
      Aws__TopicArn: arn:aws:sns:eu-central-1:921276052015:order-events
      Aws__InvoiceQueueUrl: https://sqs.eu-central-1.amazonaws.com/921276052015/order-events-invoice
      Aws__NotificationQueueUrl: https://sqs.eu-central-1.amazonaws.com/921276052015/order-events-notification
      Aws__AccessKeyId: ${AWS_ACCESS_KEY_ID}
      Aws__SecretAccessKey: ${AWS_SECRET_ACCESS_KEY}
      Gcp__ProjectId: event-driven-demo-493520
      Gcp__TopicId: order-events
      Gcp__InvoiceSubscriptionId: order-events-invoice-sub
      Gcp__NotificationSubscriptionId: events-notification-sub
      Gcp__CredentialsPath: /app/gcp-credentials.json
    volumes:
      - ${GCP_CREDENTIALS_PATH}:/app/gcp-credentials.json:ro
    depends_on:
      kafka:
        condition: service_healthy

  invoice-api:
    build:
      context: .
      dockerfile: EventDrivenDemo.InvoiceApi/Dockerfile
    ports:
      - "5034:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ActiveBroker: Kafka
      Kafka__BootstrapServers: kafka:9092
      Kafka__TopicName: order-events
      Kafka__ConsumerGroupId: invoice-consumer-group
      Aws__Region: eu-central-1
      Aws__TopicArn: arn:aws:sns:eu-central-1:921276052015:order-events
      Aws__InvoiceQueueUrl: https://sqs.eu-central-1.amazonaws.com/921276052015/order-events-invoice
      Aws__NotificationQueueUrl: https://sqs.eu-central-1.amazonaws.com/921276052015/order-events-notification
      Aws__AccessKeyId: ${AWS_ACCESS_KEY_ID}
      Aws__SecretAccessKey: ${AWS_SECRET_ACCESS_KEY}
      Gcp__ProjectId: event-driven-demo-493520
      Gcp__TopicId: order-events
      Gcp__InvoiceSubscriptionId: order-events-invoice-sub
      Gcp__NotificationSubscriptionId: events-notification-sub
      Gcp__CredentialsPath: /app/gcp-credentials.json
    volumes:
      - ${GCP_CREDENTIALS_PATH}:/app/gcp-credentials.json:ro
    depends_on:
      kafka:
        condition: service_healthy

  notification-api:
    build:
      context: .
      dockerfile: EventDrivenDemo.NotificationApi/Dockerfile
    ports:
      - "5059:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ActiveBroker: Kafka
      Kafka__BootstrapServers: kafka:9092
      Kafka__TopicName: order-events
      Kafka__ConsumerGroupId: notification-consumer-group
      Aws__Region: eu-central-1
      Aws__TopicArn: arn:aws:sns:eu-central-1:921276052015:order-events
      Aws__InvoiceQueueUrl: https://sqs.eu-central-1.amazonaws.com/921276052015/order-events-invoice
      Aws__NotificationQueueUrl: https://sqs.eu-central-1.amazonaws.com/921276052015/order-events-notification
      Aws__AccessKeyId: ${AWS_ACCESS_KEY_ID}
      Aws__SecretAccessKey: ${AWS_SECRET_ACCESS_KEY}
      Gcp__ProjectId: event-driven-demo-493520
      Gcp__TopicId: order-events
      Gcp__InvoiceSubscriptionId: order-events-invoice-sub
      Gcp__NotificationSubscriptionId: events-notification-sub
      Gcp__CredentialsPath: /app/gcp-credentials.json
    volumes:
      - ${GCP_CREDENTIALS_PATH}:/app/gcp-credentials.json:ro
    depends_on:
      kafka:
        condition: service_healthy

  # ── Frontend ───────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - order-api
      - invoice-api
      - notification-api
